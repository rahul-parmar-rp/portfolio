name: Dev Journal Pages Deploy

"on":
  push:
    branches:
      - main
    paths:
      - docs/dev-journal/**
      - .github/workflows/dev-journal-pages.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/dev-journal/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: docs/dev-journal
        run: pnpm install --frozen-lockfile

      - name: Build site
        working-directory: docs/dev-journal
        run: pnpm build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/dev-journal/build
          publish_branch: gh-pages
          force_orphan: true
